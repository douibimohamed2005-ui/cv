<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>SmartCV – Verify Code</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
        :root {
            --pu: #7C3AED; --pu2: #6D28D9; --pl: #A78BFA;
            --tx: #1a1a2e; --mt: #6b7280; --bd: #e5e7eb; --wh: #ffffff; --er: #ef4444;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(160deg, #f0f4ff 0%, #fdf2fc 40%, #ede9fe 70%, #fce7f3 100%);
            padding: 20px; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; top: -200px; right: -200px; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(167, 139, 250, .2) 0%, transparent 70%); pointer-events: none;
        }
        body::after {
            content: ''; position: absolute; bottom: -150px; left: -150px; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(236, 72, 153, .1) 0%, transparent 70%); pointer-events: none;
        }
        .card {
            position: relative; background: rgba(255, 255, 255, .92); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .8); border-radius: 24px;
            box-shadow: 0 20px 60px rgba(124, 58, 237, .12), 0 4px 16px rgba(0, 0, 0, .06);
            padding: 48px 40px; width: 100%; max-width: 440px;
            animation: pop .5s cubic-bezier(.22, 1, .36, 1) both; text-align: center;
        }
        @keyframes pop {
            from { opacity: 0; transform: scale(.96) translateY(20px) }
            to { opacity: 1; transform: scale(1) translateY(0) }
        }
        .icon-wrap {
            width: 56px; height: 56px; background: #f3f0ff; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
        }
        .icon-wrap svg {
            width: 28px; height: 28px; stroke: var(--pu); fill: none; stroke-width: 2;
        }
        .title {
            font-size: 24px; font-weight: 800; color: var(--tx); margin-bottom: 8px;
        }
        .desc {
            font-size: 14px; color: var(--mt); margin-bottom: 32px; line-height: 1.5;
        }
        
        .otp-container {
            display: flex; justify-content: center; gap: 10px; margin-bottom: 24px;
        }
        .otp-input {
            width: 48px; height: 56px; border: 1.5px solid var(--bd); border-radius: 12px;
            font-size: 24px; font-weight: 700; color: var(--tx); text-align: center;
            background: var(--wh); outline: none; transition: .2s;
        }
        .otp-input:focus {
            border-color: var(--pu); box-shadow: 0 0 0 4px rgba(124, 58, 237, .1);
        }

        .btn-submit {
            width: 100%; background: linear-gradient(135deg, var(--pu), var(--pu2)); color: #fff;
            border: none; padding: 14px; border-radius: 12px; font: 700 15px 'Plus Jakarta Sans', sans-serif;
            cursor: pointer; box-shadow: 0 6px 20px rgba(124, 58, 237, .4); transition: .2s;
            display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
        }
        .btn-submit:hover { transform: translateY(-1px); opacity: .93; }
        .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
        
        .resend-box { font-size: 13px; color: var(--mt); }
        .resend-btn {
            background: none; border: none; color: var(--pu); font: 600 13px 'Plus Jakarta Sans', sans-serif;
            cursor: pointer; padding: 0; margin-left: 4px;
        }
        .resend-btn:hover { text-decoration: underline; }
        .resend-btn:disabled { color: var(--mt); cursor: not-allowed; text-decoration: none; }
        
        .toast {
            position: fixed; top: 24px; right: 24px; background: var(--tx); color: #fff;
            padding: 12px 20px; border-radius: 12px; font: 600 14px 'Plus Jakarta Sans', sans-serif;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .2); transform: translateX(120%);
            transition: .3s cubic-bezier(.22, 1, .36, 1); z-index: 999;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #059669; }
        .toast.error { background: var(--er); }
        .spinner {
            width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4);
            border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src='../js/theme.js'></script>
</head>
<body>

    <div class="card">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1 class="title">Check your email</h1>
        <p class="desc">We've sent a 6-digit verification code to <strong id="emailDisplay"></strong>.</p>
        
        <div class="otp-container" id="otpContainer">
            <input type="text" class="otp-input" maxlength="1" autofocus>
            <input type="text" class="otp-input" maxlength="1">
            <input type="text" class="otp-input" maxlength="1">
            <input type="text" class="otp-input" maxlength="1">
            <input type="text" class="otp-input" maxlength="1">
            <input type="text" class="otp-input" maxlength="1">
        </div>
        
        <button class="btn-submit" id="btnSubmit" onclick="verifyOTP()">Verify Code</button>
        
        <div class="resend-box">
            Didn't receive the code? 
            <button class="resend-btn" id="btnResend" onclick="resendOTP()" disabled>Resend in <span id="timer">05:00</span></button>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = 'http://localhost:3000/api';
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        
        if(!email) window.location.href = 'forgot.html';
        document.getElementById('emailDisplay').textContent = email;

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        // OTP Input Auto-move
        const inputs = document.querySelectorAll('.otp-input');
        inputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value.length === 1 && index < inputs.length - 1) {
                    inputs[index + 1].focus();
                }
                if (Array.from(inputs).every(i => i.value.length === 1)) {
                    verifyOTP();
                }
            });

            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && e.target.value === '' && index > 0) {
                    inputs[index - 1].focus();
                }
            });

            // Handle paste
            input.addEventListener('paste', (e) => {
                e.preventDefault();
                const pastedData = e.clipboardData.getData('text').slice(0, 6);
                pastedData.split('').forEach((char, i) => {
                    if(inputs[index + i]) {
                        inputs[index + i].value = char;
                    }
                });
                if(pastedData.length === 6) verifyOTP();
                else if(inputs[index + pastedData.length]) inputs[index + pastedData.length].focus();
            });
        });

        // Timer Logic
        let timeLeft = 300; // 5 minutes
        let timerId;
        
        function updateTimer() {
            const m = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const s = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('timer').textContent = `${m}:${s}`;
            
            if (timeLeft === 0) {
                clearInterval(timerId);
                const btn = document.getElementById('btnResend');
                btn.disabled = false;
                btn.innerHTML = 'Resend now';
            } else {
                timeLeft--;
            }
        }
        
        function startTimer() {
            timeLeft = 300;
            document.getElementById('btnResend').disabled = true;
            updateTimer();
            timerId = setInterval(updateTimer, 1000);
        }
        startTimer();

        // API Calls
        async function verifyOTP() {
            const otp = Array.from(inputs).map(i => i.value).join('');
            if (otp.length !== 6) return showToast('Please enter the full 6-digit code', 'error');

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';

            try {
                const res = await fetch(`${API}/auth/verify-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp })
                });
                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error || 'Invalid or expired code', 'error');
                    inputs.forEach(i => i.value = '');
                    inputs[0].focus();
                    btn.disabled = false;
                    btn.innerHTML = 'Verify Code';
                    return;
                }

                showToast('Code verified!', 'success');
                setTimeout(() => {
                    location.href = `reset.html?email=${encodeURIComponent(email)}&otp=${encodeURIComponent(otp)}`;
                }, 1000);

            } catch (err) {
                showToast('Network error', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Verify Code';
            }
        }

        async function resendOTP() {
            const btn = document.getElementById('btnResend');
            btn.innerHTML = 'Sending...';
            btn.disabled = true;

            try {
                const res = await fetch(`${API}/auth/resend-otp`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error || 'Failed to resend code', 'error');
                    btn.innerHTML = 'Resend now';
                    btn.disabled = false;
                    return;
                }

                showToast('New code sent!', 'success');
                startTimer();

            } catch (err) {
                showToast('Network error', 'error');
                btn.innerHTML = 'Resend now';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
