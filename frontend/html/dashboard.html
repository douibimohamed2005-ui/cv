<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>SmartCV – Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <style>
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --pu: #7C3AED;
            --pu2: #6D28D9;
            --pl: #A78BFA;
            --tx: #1a1a2e;
            --mt: #6b7280;
            --bd: #e5e7eb;
            --bg: #f8f8fc;
            --wh: #fff
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--tx);
            min-height: 100vh
        }

        /* ── NAV ── */
        nav {
            background: var(--wh);
            border-bottom: 1px solid var(--bd);
            padding: 0 32px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 1px 8px rgba(0, 0, 0, .04)
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 800;
            font-size: 17px;
            color: var(--tx);
            text-decoration: none
        }

        .logo-icon {
            width: 30px;
            height: 30px;
            background: linear-gradient(135deg, var(--pu), var(--pl));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .logo-icon svg {
            width: 15px;
            height: 15px;
            stroke: #fff;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        .nav-r {
            display: flex;
            align-items: center;
            gap: 10px
        }

        /* ── GMAIL-STYLE USER BADGE ── */
        .user-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #f3f0ff;
            border: 1.5px solid #ddd6fe;
            border-radius: 100px;
            padding: 5px 14px 5px 5px;
            cursor: pointer;
            transition: .2s;
            text-decoration: none
        }

        .user-badge:hover {
            background: #ede9fe;
            border-color: var(--pl)
        }

        .avatar-circle {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--pu), var(--pl));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            font-size: 14px;
            font-weight: 800;
            flex-shrink: 0
        }

        .user-email {
            font-size: 13px;
            font-weight: 600;
            color: var(--pu);
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap
        }

        .btn-signout {
            background: none;
            border: 1.5px solid var(--bd);
            color: var(--mt);
            padding: 7px 14px;
            border-radius: 9px;
            font: 600 13px 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            transition: .2s;
            display: flex;
            align-items: center;
            gap: 6px
        }

        .btn-signout:hover {
            border-color: #ef4444;
            color: #ef4444
        }

        .btn-signout svg {
            width: 14px;
            height: 14px;
            stroke: currentColor;
            fill: none;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round
        }

        /* ── MAIN ── */
        main {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 24px
        }

        .page-head {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            margin-bottom: 28px;
            flex-wrap: wrap;
            gap: 12px
        }

        .page-head h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: -.5px
        }

        .page-head p {
            font-size: 13px;
            color: var(--mt);
            margin-top: 3px
        }

        .btn-new {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, var(--pu), var(--pu2));
            color: #fff;
            border: none;
            padding: 11px 22px;
            border-radius: 12px;
            font: 700 14px 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            box-shadow: 0 4px 16px rgba(124, 58, 237, .3);
            transition: .2s
        }

        .btn-new:hover {
            transform: translateY(-1px);
            opacity: .92
        }

        /* ── STATS ── */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 16px;
            margin-bottom: 32px
        }

        .stat-card {
            background: var(--wh);
            border: 1px solid var(--bd);
            border-radius: 14px;
            padding: 20px 22px;
            display: flex;
            align-items: center;
            gap: 14px
        }

        .stat-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0
        }

        .stat-val {
            font-size: 24px;
            font-weight: 800;
            color: var(--tx)
        }

        .stat-lbl {
            font-size: 12px;
            color: var(--mt);
            font-weight: 500
        }

        /* ── CV GRID ── */
        .cv-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
            gap: 20px
        }

        .cv-card {
            background: var(--wh);
            border: 1px solid var(--bd);
            border-radius: 16px;
            overflow: hidden;
            transition: .25s;
            animation: fadeUp .4s both
        }

        .cv-card:hover {
            box-shadow: 0 8px 32px rgba(124, 58, 237, .12);
            transform: translateY(-3px)
        }

        @keyframes fadeUp {
            from {
                opacity: 0;
                transform: translateY(16px)
            }

            to {
                opacity: 1;
                transform: translateY(0)
            }
        }

        .cv-card-banner {
            height: 110px;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center
        }

        .badge {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 11px;
            font-weight: 700;
            padding: 3px 10px;
            border-radius: 100px;
            backdrop-filter: blur(4px)
        }

        .badge-complete {
            background: rgba(5, 150, 105, .15);
            color: #059669;
            border: 1px solid rgba(5, 150, 105, .3)
        }

        .badge-draft {
            background: rgba(245, 158, 11, .15);
            color: #d97706;
            border: 1px solid rgba(245, 158, 11, .3)
        }

        .cv-card-body {
            padding: 16px 18px 10px
        }

        .cv-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .cv-sub {
            font-size: 12px;
            color: var(--mt);
            margin-bottom: 10px;
            text-transform: capitalize
        }

        .completion-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px
        }

        .completion-bar-wrap {
            flex: 1;
            height: 5px;
            background: #f1f5f9;
            border-radius: 100px;
            overflow: hidden
        }

        .completion-bar {
            height: 100%;
            border-radius: 100px;
            transition: width .6s cubic-bezier(.22, 1, .36, 1)
        }

        .completion-pct {
            font-size: 11px;
            font-weight: 700;
            min-width: 30px;
            text-align: right
        }

        .cv-date {
            font-size: 11px;
            color: var(--mt)
        }

        .cv-card-footer {
            padding: 10px 14px 14px;
            display: flex;
            gap: 6px;
            flex-wrap: wrap
        }

        .card-btn {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 6px 12px;
            border: 1.5px solid var(--bd);
            border-radius: 8px;
            font: 600 12px 'Plus Jakarta Sans', sans-serif;
            cursor: pointer;
            background: none;
            color: var(--mt);
            transition: .15s
        }

        .card-btn:hover {
            border-color: var(--pu);
            color: var(--pu);
            background: #f9f7ff
        }

        .btn-delete {
            margin-left: auto;
            color: #ef4444 !important;
            border-color: #fecaca !important
        }

        .btn-delete:hover {
            background: #fef2f2 !important;
            border-color: #ef4444 !important
        }

        /* ── EMPTY / LOADING ── */
        .loading-state,
        .empty-state,
        .error-state {
            grid-column: 1/-1;
            text-align: center;
            padding: 80px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px
        }

        .spinner-lg {
            width: 40px;
            height: 40px;
            border: 4px solid #e5e7eb;
            border-top-color: var(--pu);
            border-radius: 50%;
            animation: spin .8s linear infinite
        }

        @keyframes spin {
            to {
                transform: rotate(360deg)
            }
        }

        .empty-icon {
            width: 72px;
            height: 72px;
            background: #f1f5f9;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #c4c9d4
        }

        .empty-state h2 {
            font-size: 18px;
            font-weight: 700
        }

        .empty-state p {
            font-size: 14px;
            color: var(--mt)
        }

        /* ── MODAL ── */
        .overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, .45);
            backdrop-filter: blur(4px);
            z-index: 200;
            display: none;
            align-items: center;
            justify-content: center
        }

        .overlay.show {
            display: flex
        }

        .modal {
            background: var(--wh);
            border-radius: 20px;
            padding: 36px 32px;
            max-width: 380px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .15)
        }

        .modal h3 {
            font-size: 18px;
            font-weight: 800;
            margin-bottom: 8px
        }

        .modal p {
            font-size: 14px;
            color: var(--mt);
            margin-bottom: 24px;
            line-height: 1.6
        }

        .modal-btns {
            display: flex;
            gap: 10px;
            justify-content: flex-end
        }

        .btn-cancel {
            background: none;
            border: 1.5px solid var(--bd);
            color: var(--tx);
            padding: 9px 20px;
            border-radius: 10px;
            font: 600 14px 'Plus Jakarta Sans', sans-serif;
            cursor: pointer
        }

        .btn-danger {
            background: #ef4444;
            color: #fff;
            border: none;
            padding: 9px 20px;
            border-radius: 10px;
            font: 700 14px 'Plus Jakarta Sans', sans-serif;
            cursor: pointer
        }

        /* ── TOAST ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--tx);
            color: #fff;
            padding: 12px 20px;
            border-radius: 12px;
            font: 600 14px 'Plus Jakarta Sans', sans-serif;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .2);
            transform: translateY(80px);
            opacity: 0;
            transition: .3s;
            z-index: 999
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1
        }

        .toast.success {
            background: #059669
        }

        .toast.error {
            background: #ef4444
        }

        .toast.warning {
            background: #f59e0b
        }

        @media(max-width:600px) {
            .stats-bar {
                grid-template-columns: 1fr
            }

            .page-head {
                flex-direction: column;
                align-items: flex-start
            }

            nav {
                padding: 0 16px
            }
        }
    </style>
    <script src='../js/theme.js'></script>
</head>

<body>

    <nav>
        <a href="dashboard.html" class="logo">
            <div class="logo-icon"><svg viewBox="0 0 24 24">
                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z" />
                    <polyline points="14 2 14 8 20 8" />
                </svg></div>
            SmartCV
        </a>
        <div class="nav-r">
            <a href="profile.html" class="user-badge">
                <div class="avatar-circle" id="headerAvatar">U</div>
                <span class="user-email" id="headerEmail">loading…</span>
            </a>
            <button class="btn-signout" onclick="signOut()">
                <svg viewBox="0 0 24 24">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4" />
                    <polyline points="16 17 21 12 16 7" />
                    <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Sign Out
            </button>
        </div>
    </nav>

    <main>
        <div class="page-head">
            <div>
                <h1>My CVs</h1>
                <p>Manage and build your resumes</p>
            </div>
            <button class="btn-new" onclick="location.href='builder.html'">+ New CV</button>
        </div>

        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-icon" style="background:#ede9fe">📄</div>
                <div>
                    <div class="stat-val" id="statTotal">—</div>
                    <div class="stat-lbl">Total CVs</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#d1fae5">✅</div>
                <div>
                    <div class="stat-val" id="statComplete">—</div>
                    <div class="stat-lbl">Complete</div>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background:#fef3c7">✏️</div>
                <div>
                    <div class="stat-val" id="statDraft">—</div>
                    <div class="stat-lbl">Drafts</div>
                </div>
            </div>
        </div>

        <div class="cv-grid" id="cvGrid">
            <div class="loading-state">
                <div class="spinner-lg"></div>
                <p>Loading your CVs…</p>
            </div>
        </div>
    </main>

    <!-- Delete Modal -->
    <div class="overlay" id="deleteOverlay">
        <div class="modal">
            <h3>Delete CV?</h3>
            <p>Are you sure you want to delete "<span id="deleteTitle"></span>"? This cannot be undone.</p>
            <div class="modal-btns">
                <button class="btn-cancel" onclick="closeModal()">Cancel</button>
                <button class="btn-danger" onclick="doDelete()">Delete</button>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="../js/dashboard.js"></script>
</body>

</html>
