<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>SmartCV – Reset Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
        :root {
            --pu: #7C3AED; --pu2: #6D28D9; --pl: #A78BFA;
            --tx: #1a1a2e; --mt: #6b7280; --bd: #e5e7eb; --wh: #ffffff; --er: #ef4444; --sc: #059669;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(160deg, #f0f4ff 0%, #fdf2fc 40%, #ede9fe 70%, #fce7f3 100%);
            padding: 20px; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; top: -200px; right: -200px; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(167, 139, 250, .2) 0%, transparent 70%); pointer-events: none;
        }
        body::after {
            content: ''; position: absolute; bottom: -150px; left: -150px; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(236, 72, 153, .1) 0%, transparent 70%); pointer-events: none;
        }
        .card {
            position: relative; background: rgba(255, 255, 255, .92); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .8); border-radius: 24px;
            box-shadow: 0 20px 60px rgba(124, 58, 237, .12), 0 4px 16px rgba(0, 0, 0, .06);
            padding: 48px 40px; width: 100%; max-width: 440px;
            animation: pop .5s cubic-bezier(.22, 1, .36, 1) both;
        }
        @keyframes pop {
            from { opacity: 0; transform: scale(.96) translateY(20px) }
            to { opacity: 1; transform: scale(1) translateY(0) }
        }
        .icon-wrap {
            width: 56px; height: 56px; background: #f3f0ff; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
        }
        .icon-wrap svg {
            width: 28px; height: 28px; stroke: var(--pu); fill: none; stroke-width: 2;
        }
        .title {
            font-size: 24px; font-weight: 800; color: var(--tx); margin-bottom: 8px; text-align: center;
        }
        .desc {
            font-size: 14px; color: var(--mt); margin-bottom: 32px; line-height: 1.5; text-align: center;
        }
        .field {
            margin-bottom: 18px; position: relative;
        }
        .field label {
            display: block; font-size: 13px; font-weight: 600; color: var(--tx); margin-bottom: 6px;
        }
        .input-wrap { position: relative; }
        .field input {
            width: 100%; border: 1.5px solid var(--bd); border-radius: 12px; padding: 12px 16px;
            font: 500 15px 'Plus Jakarta Sans', sans-serif; color: var(--tx); background: var(--wh);
            outline: none; transition: .2s; padding-right: 40px;
        }
        .field input:focus {
            border-color: var(--pu); box-shadow: 0 0 0 4px rgba(124, 58, 237, .1);
        }
        .field input.err { border-color: var(--er); }
        .field input.succ { border-color: var(--sc); }
        
        .toggle-btn {
            position: absolute; right: 12px; top: 12px; background: none; border: none; cursor: pointer;
            color: var(--mt); padding: 0; display: flex; align-items: center; justify-content: center;
        }
        .toggle-btn:hover { color: var(--tx); }
        .toggle-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

        .err-msg {
            font-size: 12px; color: var(--er); margin-top: 4px; display: none;
        }
        .err-msg.show { display: block; }
        
        .rules {
            font-size: 12px; color: var(--mt); margin-top: 8px; list-style: none;
        }
        .rules li { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
        .rules li.valid { color: var(--sc); }
        .rules li svg { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 2; }

        .btn-submit {
            width: 100%; background: linear-gradient(135deg, var(--pu), var(--pu2)); color: #fff;
            border: none; padding: 14px; border-radius: 12px; font: 700 15px 'Plus Jakarta Sans', sans-serif;
            cursor: pointer; box-shadow: 0 6px 20px rgba(124, 58, 237, .4); transition: .2s;
            display: flex; align-items: center; justify-content: center; margin-top: 30px;
        }
        .btn-submit:hover { transform: translateY(-1px); opacity: .93; }
        .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
        
        .toast {
            position: fixed; top: 24px; right: 24px; background: var(--tx); color: #fff;
            padding: 12px 20px; border-radius: 12px; font: 600 14px 'Plus Jakarta Sans', sans-serif;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .2); transform: translateX(120%);
            transition: .3s cubic-bezier(.22, 1, .36, 1); z-index: 999;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #059669; }
        .toast.error { background: var(--er); }
        .spinner {
            width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4);
            border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src='../js/theme.js'></script>
</head>
<body>

    <div class="card">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1 class="title">Reset Password</h1>
        <p class="desc">Enter your new password below.</p>
        
        <div class="field">
            <label>New Password</label>
            <div class="input-wrap">
                <input type="password" id="newPass" placeholder="••••••••" autofocus />
                <button class="toggle-btn" onclick="toggleVis('newPass', 'iconNew')">
                    <svg id="iconNew" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <ul class="rules">
                <li id="ruleMin"><svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg> At least 8 characters</li>
            </ul>
        </div>

        <div class="field">
            <label>Confirm Password</label>
            <div class="input-wrap">
                <input type="password" id="confirmPass" placeholder="••••••••" />
                <button class="toggle-btn" onclick="toggleVis('confirmPass', 'iconConfirm')">
                    <svg id="iconConfirm" viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
            </div>
            <div class="err-msg" id="matchErr">Passwords do not match</div>
        </div>
        
        <button class="btn-submit" id="btnSubmit" onclick="resetPassword()" disabled>Reset Password</button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API = 'http://localhost:3000/api';
        const params = new URLSearchParams(window.location.search);
        const email = params.get('email');
        const otp = params.get('otp');
        
        if(!email || !otp) window.location.href = 'forgot.html';

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        function toggleVis(inputId, iconId) {
            const inp = document.getElementById(inputId);
            const icon = document.getElementById(iconId);
            if(inp.type === 'password') {
                inp.type = 'text';
                icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
            } else {
                inp.type = 'password';
                icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
            }
        }

        const newPass = document.getElementById('newPass');
        const confirmPass = document.getElementById('confirmPass');
        const btnSubmit = document.getElementById('btnSubmit');

        function validate() {
            const p1 = newPass.value;
            const p2 = confirmPass.value;
            
            const isMin = p1.length >= 8;
            document.getElementById('ruleMin').classList.toggle('valid', isMin);
            
            let isMatch = false;
            if(p2.length > 0) {
                isMatch = p1 === p2;
                document.getElementById('matchErr').classList.toggle('show', !isMatch);
                confirmPass.classList.toggle('err', !isMatch);
                confirmPass.classList.toggle('succ', isMatch);
            } else {
                document.getElementById('matchErr').classList.remove('show');
                confirmPass.classList.remove('err', 'succ');
            }

            btnSubmit.disabled = !(isMin && isMatch);
        }

        newPass.addEventListener('input', validate);
        confirmPass.addEventListener('input', validate);

        async function resetPassword() {
            const password = newPass.value;

            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<div class="spinner"></div>';

            try {
                const res = await fetch(`${API}/auth/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, otp, password })
                });
                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error || 'Failed to reset password', 'error');
                    btnSubmit.disabled = false;
                    btnSubmit.innerHTML = 'Reset Password';
                    return;
                }

                showToast('Password updated successfully! Logging you in...', 'success');
                
                // Auto login logic (or redirect to auth.html)
                const loginRes = await fetch(`${API}/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const loginData = await loginRes.json();
                
                if(loginRes.ok) {
                    localStorage.setItem('sc_token', loginData.access_token);
                    localStorage.setItem('sc_user', JSON.stringify(loginData.user));
                    setTimeout(() => location.href = 'dashboard.html', 1500);
                } else {
                    setTimeout(() => location.href = 'auth.html', 1500);
                }

            } catch (err) {
                showToast('Network error', 'error');
                btnSubmit.disabled = false;
                btnSubmit.innerHTML = 'Reset Password';
            }
        }
    </script>
</body>
</html>
