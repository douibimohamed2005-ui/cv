<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>SmartCV – Profile Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--pu:#7C3AED;--pu2:#6D28D9;--pl:#A78BFA;--tx:#1a1a2e;--mt:#6b7280;--bd:#e5e7eb;--bg:#f8f8fc;--wh:#fff}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;display:flex;flex-direction:column}

/* NAV */
nav{background:var(--wh);border-bottom:1px solid var(--bd);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;box-shadow:0 1px 8px rgba(0,0,0,.04)}
.logo{display:flex;align-items:center;gap:8px;font-weight:800;font-size:17px;color:var(--tx);text-decoration:none}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,var(--pu),var(--pl));border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:15px;height:15px;stroke:#fff;fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
.nav-r{display:flex;align-items:center;gap:10px}

.btn-back{background:none;border:1.5px solid var(--bd);color:var(--mt);padding:7px 14px;border-radius:9px;font:600 13px 'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:6px;text-decoration:none}
.btn-back:hover{border-color:var(--pu);color:var(--pu)}
.btn-back svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* WORKSPACE */
main{max-width:800px;margin:40px auto;padding:0 24px;width:100%}
.page-head{margin-bottom:28px}
.page-head h1{font-size:26px;font-weight:800;letter-spacing:-.5px}
.page-head p{font-size:14px;color:var(--mt);margin-top:4px}

.profile-card{background:var(--wh);border:1px solid var(--bd);border-radius:16px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,.03)}
.profile-banner{height:120px;background:linear-gradient(135deg,var(--pu),var(--pl))}
.profile-body{padding:0 32px 32px;position:relative}

/* AVATAR */
.avatar-section{display:flex;align-items:flex-end;gap:20px;margin-top:-50px;margin-bottom:32px}
.avatar-wrap{width:100px;height:100px;border-radius:50%;border:4px solid var(--wh);background:var(--bg);position:relative;overflow:hidden;box-shadow:0 4px 12px rgba(0,0,0,.1);flex-shrink:0}
.avatar-initial{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-size:36px;font-weight:800;color:var(--wh);background:linear-gradient(135deg,var(--pu),var(--pu2))}
.avatar-img{width:100%;height:100%;object-fit:cover;display:none}
.btn-upload{background:var(--wh);border:1.5px solid var(--bd);color:var(--tx);padding:8px 16px;border-radius:10px;font:600 13px 'Plus Jakarta Sans',sans-serif;cursor:pointer;transition:.2s}
.btn-upload:hover{border-color:var(--pu);color:var(--pu)}

/* FORM GRID */
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.field{margin-bottom:20px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--tx);margin-bottom:8px}
.field input, .field textarea{width:100%;background:#f8f9fa;border:1.5px solid #e2e8f0;border-radius:10px;padding:12px 14px;font:500 14px 'Plus Jakarta Sans',sans-serif;color:var(--tx);transition:.2s}
.field input:focus, .field textarea:focus{background:#fff;border-color:var(--pu);outline:none;box-shadow:0 0 0 4px rgba(124,58,237,.1)}
.field textarea{resize:vertical;min-height:100px}
.email-display{font-size:14px;color:var(--mt);padding:12px 0}

.form-footer{display:flex;justify-content:flex-end;gap:12px;margin-top:12px;padding-top:24px;border-top:1px solid var(--bd)}
.btn-save{background:linear-gradient(135deg,var(--pu),var(--pu2));color:#fff;border:none;padding:12px 24px;border-radius:12px;font:700 14px 'Plus Jakarta Sans',sans-serif;cursor:pointer;box-shadow:0 4px 16px rgba(124,58,237,.3);transition:.2s}
.btn-save:hover{transform:translateY(-1px);opacity:.92}

/* TOAST */
.toast{position:fixed;bottom:24px;right:24px;background:var(--tx);color:#fff;padding:12px 20px;border-radius:12px;font:600 14px 'Plus Jakarta Sans',sans-serif;box-shadow:0 8px 24px rgba(0,0,0,.2);transform:translateY(80px);opacity:0;transition:.3s;z-index:999}
.toast.show{transform:translateY(0);opacity:1}
.toast.success{background:#059669}.toast.error{background:#ef4444}

@media(max-width:600px){
  .grid2{grid-template-columns:1fr}
  nav{padding:0 16px}
  .profile-body{padding:0 20px 24px}
}
</style>
    <script src='../js/theme.js'></script>
</head>
<body>

<nav>
  <a href="dashboard.html" class="logo">
    <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg></div>
    SmartCV
  </a>
  <div class="nav-r">
    <a href="dashboard.html" class="btn-back">
      <svg viewBox="0 0 24 24"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
      Dashboard
    </a>
  </div>
</nav>

<main>
  <div class="page-head">
    <h1>Profile Settings</h1>
    <p>Manage your account details and preferences</p>
  </div>

  <div class="profile-card">
    <div class="profile-banner"></div>
    <div class="profile-body">
      
      <div class="avatar-section">
        <div class="avatar-wrap">
          <div class="avatar-initial" id="avatarInitial">U</div>
          <img class="avatar-img" id="avatarImg" src="" alt="Avatar"/>
        </div>
        <div>
          <button class="btn-upload" id="btnUpload" onclick="triggerUpload()">Change Photo</button>
          <input type="file" id="avatarInput" style="display:none" accept="image/*" onchange="handleAvatarUpload(event)"/>
        </div>
      </div>

      <div class="grid2">
        <div class="field">
          <label>Full Name</label>
          <input id="pFullName" placeholder="e.g. Jane Doe"/>
        </div>
        <div class="field">
          <label>Email Address</label>
          <div class="email-display" id="pEmail">user@example.com</div>
        </div>
      </div>

      <div class="field">
        <label>Professional Role</label>
        <input id="pRole" placeholder="e.g. Software Engineer"/>
      </div>

      <div class="grid2">
        <div class="field">
          <label>Phone Number</label>
          <input id="pPhone" placeholder="e.g. +1 234 567 8900"/>
        </div>
        <div class="field">
          <label>Location / Address</label>
          <input id="pAddress" placeholder="City, Country"/>
        </div>
      </div>

      <div class="field">
        <label>Bio</label>
        <textarea id="pBio" placeholder="Write a short professional bio..."></textarea>
      </div>

      <div class="form-footer">
        <button class="btn-save" id="btnSave" onclick="saveProfile()">Save Changes</button>
      </div>

    </div>
  </div>
</main>

<div class="toast" id="toast"></div>

<!-- Hidden elements required by initHeader() from other scripts, though we don't strictly need them in the navbar here since we are on the profile page itself. -->
<div style="display:none">
  <span id="headerAvatar"></span>
  <span id="headerEmail"></span>
</div>

<script src="../js/profile.js"></script>
</body>
</html>
