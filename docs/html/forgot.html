<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>SmartCV – Forgot Password</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0 }
        :root {
            --pu: #7C3AED; --pu2: #6D28D9; --pl: #A78BFA;
            --tx: #1a1a2e; --mt: #6b7280; --bd: #e5e7eb; --wh: #ffffff; --er: #ef4444;
        }
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            min-height: 100vh; display: flex; align-items: center; justify-content: center;
            background: linear-gradient(160deg, #f0f4ff 0%, #fdf2fc 40%, #ede9fe 70%, #fce7f3 100%);
            padding: 20px; position: relative; overflow: hidden;
        }
        body::before {
            content: ''; position: absolute; top: -200px; right: -200px; width: 600px; height: 600px;
            background: radial-gradient(circle, rgba(167, 139, 250, .2) 0%, transparent 70%); pointer-events: none;
        }
        body::after {
            content: ''; position: absolute; bottom: -150px; left: -150px; width: 500px; height: 500px;
            background: radial-gradient(circle, rgba(236, 72, 153, .1) 0%, transparent 70%); pointer-events: none;
        }
        .card {
            position: relative; background: rgba(255, 255, 255, .92); backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, .8); border-radius: 24px;
            box-shadow: 0 20px 60px rgba(124, 58, 237, .12), 0 4px 16px rgba(0, 0, 0, .06);
            padding: 48px 40px; width: 100%; max-width: 440px;
            animation: pop .5s cubic-bezier(.22, 1, .36, 1) both; text-align: center;
        }
        @keyframes pop {
            from { opacity: 0; transform: scale(.96) translateY(20px) }
            to { opacity: 1; transform: scale(1) translateY(0) }
        }
        .icon-wrap {
            width: 56px; height: 56px; background: #f3f0ff; border-radius: 16px;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
        }
        .icon-wrap svg {
            width: 28px; height: 28px; stroke: var(--pu); fill: none; stroke-width: 2;
        }
        .title {
            font-size: 24px; font-weight: 800; color: var(--tx); margin-bottom: 8px;
        }
        .desc {
            font-size: 14px; color: var(--mt); margin-bottom: 32px; line-height: 1.5;
        }
        .field {
            margin-bottom: 24px; text-align: left;
        }
        .field label {
            display: block; font-size: 13px; font-weight: 600; color: var(--tx); margin-bottom: 6px;
        }
        .field input {
            width: 100%; border: 1.5px solid var(--bd); border-radius: 12px; padding: 12px 16px;
            font: 500 15px 'Plus Jakarta Sans', sans-serif; color: var(--tx); background: var(--wh);
            outline: none; transition: .2s;
        }
        .field input:focus {
            border-color: var(--pu); box-shadow: 0 0 0 4px rgba(124, 58, 237, .1);
        }
        .btn-submit {
            width: 100%; background: linear-gradient(135deg, var(--pu), var(--pu2)); color: #fff;
            border: none; padding: 14px; border-radius: 12px; font: 700 15px 'Plus Jakarta Sans', sans-serif;
            cursor: pointer; box-shadow: 0 6px 20px rgba(124, 58, 237, .4); transition: .2s;
            display: flex; align-items: center; justify-content: center; margin-bottom: 24px;
        }
        .btn-submit:hover { transform: translateY(-1px); opacity: .93; }
        .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }
        .back-link {
            font-size: 14px; color: var(--mt); font-weight: 600; text-decoration: none;
            display: inline-flex; align-items: center; gap: 6px; transition: .2s;
        }
        .back-link:hover { color: var(--pu); }
        .back-link svg { width: 16px; height: 16px; }
        
        .toast {
            position: fixed; top: 24px; right: 24px; background: var(--tx); color: #fff;
            padding: 12px 20px; border-radius: 12px; font: 600 14px 'Plus Jakarta Sans', sans-serif;
            box-shadow: 0 8px 24px rgba(0, 0, 0, .2); transform: translateX(120%);
            transition: .3s cubic-bezier(.22, 1, .36, 1); z-index: 999;
        }
        .toast.show { transform: translateX(0); }
        .toast.success { background: #059669; }
        .toast.error { background: var(--er); }
        .spinner {
            width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.4);
            border-top-color: #fff; border-radius: 50%; animation: spin .7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
    <script src='../js/theme.js'></script>
</head>
<body>

    <div class="card">
        <div class="icon-wrap">
            <svg viewBox="0 0 24 24">
                <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
            </svg>
        </div>
        <h1 class="title">Forgot Password</h1>
        <p class="desc">Enter your email address and we'll send you a verification code.</p>
        
        <div class="field">
            <label>Email Address</label>
            <input type="email" id="emailInput" placeholder="you@example.com" autofocus autocomplete="email" />
        </div>
        
        <button class="btn-submit" id="btnSubmit" onclick="sendCode()">Send Code</button>
        
        <a href="auth.html" class="back-link">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <line x1="19" y1="12" x2="5" y2="12"></line>
                <polyline points="12 19 5 12 12 5"></polyline>
            </svg>
            Back to Login
        </a>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const API_BASE_URL = 'https://cv-pttb.onrender.com';
        const API = `${API_BASE_URL}/api`;

        function showToast(msg, type = 'success') {
            const t = document.getElementById('toast');
            t.textContent = msg;
            t.className = 'toast ' + type + ' show';
            setTimeout(() => t.classList.remove('show'), 3500);
        }

        async function sendCode() {
            const email = document.getElementById('emailInput').value.trim();
            if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
                return showToast('Please enter a valid email address', 'error');
            }

            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerHTML = '<div class="spinner"></div>';

            try {
                const res = await fetch(`${API}/auth/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });
                const data = await res.json();

                if (!res.ok) {
                    showToast(data.error || 'Failed to send code', 'error');
                    btn.disabled = false;
                    btn.innerHTML = 'Send Code';
                    return;
                }

                showToast('Verification code sent!', 'success');
                setTimeout(() => {
                    location.href = `verify.html?email=${encodeURIComponent(email)}`;
                }, 1500);

            } catch (err) {
                showToast('Network error. Is the server running?', 'error');
                btn.disabled = false;
                btn.innerHTML = 'Send Code';
            }
        }

        document.getElementById('emailInput').addEventListener('keydown', e => {
            if (e.key === 'Enter') sendCode();
        });
    </script>
</body>
</html>
